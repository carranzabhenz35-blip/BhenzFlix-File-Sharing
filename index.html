<!DOCTYPE html>
<html>
<head>
<title>BhenzFlix File Upload</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
background:#000;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#0d0d0d;
padding:40px;
border-radius:15px;
text-align:center;
box-shadow:0 0 30px red;
width:320px;
}

.logo{
font-size:35px;
color:#ff0000;
text-shadow:0 0 10px red,0 0 20px red;
margin-bottom:20px;
}

button{
background:#ff0000;
border:none;
padding:12px 20px;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
box-shadow:0 0 10px red;
margin-top:10px;
}

#result{
margin-top:20px;
word-break:break-all;
color:#00ffcc;
}
</style>

</head>

<body>

<div class="box">

<div class="logo">BhenzFlix</div>

<input type="file" id="fileInput">

<br><br>

<button onclick="uploadFile()">Upload</button>

<div id="result"></div>

</div>

<script>

const supabase = window.supabase.createClient(
"https://rjzgphkvijbanlyerjk.supabase.co",
"sb_publishable_UjizI3Y13boRID5o-72fmw_88u5QraZ"
)

async function uploadFile(){

const file=document.getElementById("fileInput").files[0]

if(!file){
alert("Select file first")
return
}

const fileName=Date.now()+"_"+file.name

document.getElementById("result").innerHTML="Uploading..."

const { error } = await supabase.storage
.from("File")
.upload(fileName,file)

if(error){
document.getElementById("result").innerHTML="Upload error: "+error.message
return
}

const { data } = supabase.storage
.from("File")
.getPublicUrl(fileName)

document.getElementById("result").innerHTML=
'<a href="'+data.publicUrl+'" target="_blank">'+data.publicUrl+'</a>'

}

</script>

</body>
</html>
