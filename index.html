<!DOCTYPE html>
<html>
<head>
<title>BhenzFlix File Sharing</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#000000,#1a0000,#000000);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#0d0d0d;
padding:40px;
border-radius:15px;
text-align:center;
box-shadow:0 0 25px red;
width:320px;
}

.logo{
font-size:35px;
color:#ff0000;
text-shadow:0 0 10px red,0 0 20px red;
margin-bottom:20px;
}

button{
background:#ff0000;
border:none;
padding:12px 20px;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
box-shadow:0 0 10px red;
margin-top:10px;
}

button:hover{
background:#cc0000;
}

#result{
margin-top:20px;
word-break:break-all;
color:#00ffcc;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">BhenzFlix</div>

<input type="file" id="fileInput">

<br>

<button onclick="uploadFile()">Upload</button>

<div id="result"></div>

</div>

<script>

const supabaseClient = supabase.createClient(
"ILAGAY_PROJECT_URL",
"ILAGAY_ANON_PUBLIC_KEY"
)

async function uploadFile(){

const file=document.getElementById("fileInput").files[0]

if(!file){
alert("Please choose a file")
return
}

const fileName=Date.now()+"_"+file.name

document.getElementById("result").innerHTML="Uploading..."

const {data,error}=await supabaseClient.storage
.from("File")
.upload(fileName,file)

if(error){

document.getElementById("result").innerHTML="Upload Error: "+error.message
return

}

const {data:publicUrl}=supabaseClient.storage
.from("File")
.getPublicUrl(fileName)

const url=publicUrl.publicUrl

document.getElementById("result").innerHTML=
`
Upload Successful!<br><br>
<a href="${url}" target="_blank">${url}</a>
<br><br>
<button onclick="copyLink('${url}')">Copy Link</button>
`

}

function copyLink(link){

navigator.clipboard.writeText(link)

alert("Link copied!")

}

</script>

</body>
</html>
