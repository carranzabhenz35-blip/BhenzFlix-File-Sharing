<!DOCTYPE html>
<html>
<head>

<title>BhenzFlix Upload</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
background:black;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#0d0d0d;
padding:40px;
border-radius:15px;
text-align:center;
box-shadow:0 0 30px red;
}

.logo{
font-size:35px;
color:red;
text-shadow:0 0 10px red;
margin-bottom:20px;
}

button{
background:red;
border:none;
padding:12px 20px;
color:white;
border-radius:8px;
cursor:pointer;
}

#link{
margin-top:20px;
word-break:break-all;
}

</style>

</head>

<body>

<div class="box">

<div class="logo">BhenzFlix</div>

<input type="file" id="fileInput">

<br><br>

<button onclick="uploadFile()">Upload</button>

<div id="link"></div>

</div>

<script>

const supabaseClient = supabase.createClient(
"PASTE_PROJECT_URL",
"PASTE_PUBLIC_ANON_KEY"
)

async function uploadFile(){

const file=document.getElementById("fileInput").files[0]

if(!file){
alert("Select file")
return
}

const fileName=Date.now()+"_"+file.name

document.getElementById("link").innerHTML="Uploading..."

const {error}=await supabaseClient.storage
.from("File")
.upload(fileName,file)

if(error){
document.getElementById("link").innerHTML="Error: "+error.message
return
}

const { data } = supabaseClient.storage
.from("File")
.getPublicUrl(fileName)

const url=data.publicUrl

document.getElementById("link").innerHTML=
'<a href="'+url+'" target="_blank">'+url+'</a>'

}

</script>

</body>
</html>
