<!DOCTYPE html>
<html>
<head>
<title>BhenzFlix File Sharing</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#000000,#1a0000,#000000);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#0d0d0d;
padding:40px;
border-radius:15px;
text-align:center;
box-shadow:0 0 20px red;
width:300px;
}

.logo{
font-size:35px;
color:#ff0000;
text-shadow:0 0 10px red,0 0 20px red;
margin-bottom:20px;
}

button{
background:#ff0000;
border:none;
padding:12px 20px;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
box-shadow:0 0 10px red;
}

button:hover{
background:#cc0000;
}

#link{
margin-top:20px;
word-break:break-all;
color:#00ffcc;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">BhenzFlix</div>

<input type="file" id="fileInput">

<br><br>

<button onclick="uploadFile()">Upload</button>

<div id="link"></div>

</div>

<script>

const supabaseClient = supabase.createClient(
"ILAGAY_PROJECT_URL",
"sb_publishable_UjizI3Y13boRID5o-72fmw_88u5QraZ"
)

async function uploadFile(){

const file=document.getElementById("fileInput").files[0]

if(!file){
alert("Pumili muna ng file")
return
}

const fileName=Date.now()+"_"+file.name

const {data,error}=await supabaseClient.storage
.from("File")
.upload(fileName,file)

if(error){
document.getElementById("link").innerHTML="Upload error: "+error.message
return
}

const {data:publicUrl}=supabaseClient.storage
.from("File")
.getPublicUrl(fileName)

document.getElementById("link").innerHTML=
"Share link:<br>"+publicUrl.publicUrl

}

</script>

</body>
</html>
