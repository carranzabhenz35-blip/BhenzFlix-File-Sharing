<!DOCTYPE html>
<html>
<head>
<title>BhenzFlix Upload</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
background:#000;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#111;
padding:40px;
border-radius:15px;
text-align:center;
box-shadow:0 0 25px red;
}

h1{
color:red;
text-shadow:0 0 10px red;
}

button{
background:red;
border:none;
padding:10px 20px;
color:white;
border-radius:6px;
margin-top:10px;
}

#link{
margin-top:20px;
word-break:break-all;
}
</style>

</head>

<body>

<div class="box">

<h1>BhenzFlix</h1>

<input type="file" id="file">

<br><br>

<button onclick="upload()">Upload</button>

<div id="link"></div>

</div>

<script>

const supabase = window.supabase.createClient(
"https://rjzgphkvijbanlyerjk.supabase.co",
"sb_publishable_UjizI3Y13boRID5o-72fmw_88u5QraZ"
)

async function upload(){

const file=document.getElementById("file").files[0]

if(!file){
alert("Select file")
return
}

const name=Date.now()+"_"+file.name

document.getElementById("link").innerHTML="Uploading..."

const { error } = await supabase.storage
.from("File")
.upload(name,file)

if(error){
document.getElementById("link").innerHTML="Error: "+error.message
return
}

const { data } = supabase.storage
.from("File")
.getPublicUrl(name)

document.getElementById("link").innerHTML=
'<a href="'+data.publicUrl+'" target="_blank">'+data.publicUrl+'</a>'

}

</script>

</body>
</html>
